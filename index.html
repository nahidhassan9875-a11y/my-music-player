<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
<title>My Music</title>

<!-- ===== Add-to-home-screen / PWA-ish touches ===== -->
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="My Music" />
<meta name="theme-color" content="#0b0b0d" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

<style>
  :root{
    --bg:#0b0b0d;
    --bg-grad-top:#16161a;
    --panel:#141417;
    --panel-2:#1b1b20;
    --text:#f4f4f6;
    --text-dim:#a3a3ad;
    --text-faint:#6b6b76;
    --accent:#1ed760;
    --accent-dim:#169c46;
    --line:rgba(255,255,255,.07);
    --shadow:0 24px 60px -20px rgba(0,0,0,.7);
  }

  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    font-family:'Figtree',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    background:var(--bg);
    color:var(--text);
    overflow:hidden;
    user-select:none;
    -webkit-user-select:none;
  }

  /* dynamic glow that picks up the current album art color */
  #ambient{
    position:fixed;
    inset:0;
    z-index:0;
    background:
      radial-gradient(120% 80% at 50% -10%, var(--glow,#2a2a32) 0%, transparent 55%),
      linear-gradient(180deg, var(--bg-grad-top) 0%, var(--bg) 60%);
    transition:background 1.2s ease;
  }

  .app{
    position:relative;
    z-index:1;
    height:100dvh;
    max-width:520px;
    margin:0 auto;
    display:flex;
    flex-direction:column;
    padding:max(env(safe-area-inset-top),18px) 20px max(env(safe-area-inset-bottom),18px);
  }

  /* ---------- top bar ---------- */
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:8px;
    flex-shrink:0;
  }
  .topbar .label{
    font-size:11px;
    letter-spacing:.18em;
    text-transform:uppercase;
    color:var(--text-faint);
  }
  .topbar h1{
    font-size:15px;
    font-weight:700;
    letter-spacing:-.01em;
  }
  .icon-btn{
    background:none;border:none;color:var(--text-dim);
    width:38px;height:38px;border-radius:50%;
    display:grid;place-items:center;cursor:pointer;transition:.18s;
  }
  .icon-btn:hover{color:var(--text);background:rgba(255,255,255,.06);}
  .icon-btn.active{color:var(--accent);}

  /* ---------- now playing ---------- */
  .now{
    flex:1;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    min-height:0;
    gap:22px;
    padding:10px 0;
  }
  .art-wrap{
    width:min(72vw,300px);
    aspect-ratio:1;
    border-radius:16px;
    overflow:hidden;
    box-shadow:var(--shadow);
    position:relative;
    flex-shrink:1;
    min-height:0;
  }
  .art-wrap img{width:100%;height:100%;object-fit:cover;display:block;}
  .art-fallback{
    position:absolute;inset:0;display:grid;place-items:center;
    font-size:64px;font-weight:800;color:rgba(255,255,255,.9);
  }
  .spinning{animation:spin 14s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  .track-meta{text-align:center;width:100%;padding:0 8px;}
  .track-title{
    font-size:22px;font-weight:700;letter-spacing:-.02em;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .track-artist{font-size:15px;color:var(--text-dim);margin-top:3px;}

  /* ---------- progress ---------- */
  .progress{width:100%;}
  .bar{
    --p:0%;
    height:6px;border-radius:99px;
    background:rgba(255,255,255,.14);
    position:relative;cursor:pointer;
  }
  .bar .fill{
    position:absolute;left:0;top:0;bottom:0;
    width:var(--p);background:var(--text);border-radius:99px;
  }
  .bar .knob{
    position:absolute;top:50%;left:var(--p);
    width:13px;height:13px;border-radius:50%;background:#fff;
    transform:translate(-50%,-50%) scale(0);
    transition:transform .12s;box-shadow:0 1px 4px rgba(0,0,0,.5);
  }
  .bar:hover .fill,.bar:hover .knob{background:var(--accent);}
  .bar:hover .knob{transform:translate(-50%,-50%) scale(1);}
  .times{
    display:flex;justify-content:space-between;
    font-size:11px;color:var(--text-faint);margin-top:7px;
    font-variant-numeric:tabular-nums;
  }

  /* ---------- controls ---------- */
  .controls{
    display:flex;align-items:center;justify-content:space-between;
    margin-top:4px;
  }
  .ctrl{
    background:none;border:none;color:var(--text);cursor:pointer;
    display:grid;place-items:center;transition:.15s;position:relative;
  }
  .ctrl svg{width:30px;height:30px;}
  .ctrl.small{color:var(--text-dim);}
  .ctrl.small svg{width:22px;height:22px;}
  .ctrl.small:hover{color:var(--text);}
  .ctrl.small.on{color:var(--accent);}
  .ctrl.small.on::after{
    content:"";position:absolute;bottom:-7px;left:50%;transform:translateX(-50%);
    width:4px;height:4px;border-radius:50%;background:var(--accent);
  }
  .play-btn{
    width:64px;height:64px;border-radius:50%;
    background:var(--text);color:#000;
    display:grid;place-items:center;cursor:pointer;border:none;
    transition:transform .12s,background .15s;
  }
  .play-btn:hover{transform:scale(1.06);background:var(--accent);}
  .play-btn:active{transform:scale(.96);}
  .play-btn svg{width:28px;height:28px;}

  .repeat-one-badge{
    position:absolute;top:-2px;right:-2px;
    font-size:8px;font-weight:800;
    background:var(--accent);color:#000;
    border-radius:50%;width:13px;height:13px;
    display:grid;place-items:center;
  }

  /* ---------- volume ---------- */
  .volume{display:flex;align-items:center;gap:10px;margin-top:18px;color:var(--text-faint);}
  .volume svg{width:18px;height:18px;flex-shrink:0;}
  .vbar{flex:1;height:5px;border-radius:99px;background:rgba(255,255,255,.14);position:relative;cursor:pointer;}
  .vbar .vfill{position:absolute;inset:0;width:70%;background:var(--text-dim);border-radius:99px;}
  .vbar:hover .vfill{background:var(--accent);}

  /* ---------- queue sheet ---------- */
  .sheet-backdrop{
    position:fixed;inset:0;z-index:5;background:rgba(0,0,0,.5);
    opacity:0;pointer-events:none;transition:.25s;backdrop-filter:blur(2px);
  }
  .sheet-backdrop.open{opacity:1;pointer-events:auto;}
  .sheet{
    position:fixed;z-index:6;left:0;right:0;bottom:0;
    max-width:520px;margin:0 auto;
    background:var(--panel);
    border-radius:20px 20px 0 0;
    transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);
    max-height:78dvh;display:flex;flex-direction:column;
    box-shadow:0 -20px 50px rgba(0,0,0,.5);
    padding-bottom:env(safe-area-inset-bottom);
  }
  .sheet.open{transform:translateY(0);}
  .sheet-grip{width:38px;height:4px;border-radius:99px;background:#3a3a42;margin:10px auto 4px;}
  .sheet-head{padding:8px 22px 14px;display:flex;justify-content:space-between;align-items:baseline;}
  .sheet-head h2{font-size:17px;font-weight:700;}
  .sheet-head span{font-size:12px;color:var(--text-faint);}
  .queue{overflow-y:auto;padding:0 12px 14px;}
  .q-item{
    display:flex;align-items:center;gap:13px;padding:9px 10px;
    border-radius:10px;cursor:pointer;transition:.15s;
  }
  .q-item:hover{background:var(--panel-2);}
  .q-item.current{background:var(--panel-2);}
  .q-art{width:44px;height:44px;border-radius:7px;object-fit:cover;flex-shrink:0;background:#26262c;display:grid;place-items:center;font-weight:800;font-size:16px;color:#fff;overflow:hidden;}
  .q-art img{width:100%;height:100%;object-fit:cover;}
  .q-text{min-width:0;flex:1;}
  .q-title{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .q-item.current .q-title{color:var(--accent);}
  .q-artist{font-size:12px;color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .q-eq{display:flex;gap:2px;align-items:flex-end;height:16px;flex-shrink:0;}
  .q-eq span{width:3px;background:var(--accent);border-radius:2px;animation:eq .9s ease-in-out infinite;}
  .q-eq span:nth-child(1){animation-delay:0s;}
  .q-eq span:nth-child(2){animation-delay:.3s;}
  .q-eq span:nth-child(3){animation-delay:.15s;}
  @keyframes eq{0%,100%{height:4px;}50%{height:16px;}}

  /* ---------- empty state ---------- */
  .empty{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;gap:14px;padding:0 30px;color:var(--text-dim);
  }
  .empty h2{color:var(--text);font-size:20px;font-weight:700;}
  .empty code{
    background:var(--panel-2);padding:2px 7px;border-radius:5px;
    font-family:ui-monospace,Menlo,monospace;font-size:12px;color:var(--accent);
  }
  .empty .hint{font-size:13px;line-height:1.6;}
</style>
</head>
<body>
<div id="ambient"></div>

<div class="app">
  <div class="topbar">
    <div>
      <div class="label">Now Playing</div>
      <h1>My Music</h1>
    </div>
    <button class="icon-btn" id="queueBtn" title="Queue" aria-label="Open queue">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="16" y2="6"/><line x1="3" y1="12" x2="13" y2="12"/><line x1="3" y1="18" x2="11" y2="18"/><circle cx="19" cy="16" r="3" fill="currentColor" stroke="none"/></svg>
    </button>
  </div>

  <!-- Player UI (hidden if no songs) -->
  <div class="now" id="playerUI" style="display:none;">
    <div class="art-wrap">
      <div class="art-fallback" id="artFallback">♪</div>
      <img id="artImg" alt="" style="display:none;" />
    </div>

    <div class="track-meta">
      <div class="track-title" id="trackTitle">—</div>
      <div class="track-artist" id="trackArtist">—</div>
    </div>

    <div class="progress">
      <div class="bar" id="seekBar"><div class="fill" id="seekFill"></div><div class="knob" id="seekKnob"></div></div>
      <div class="times"><span id="curTime">0:00</span><span id="durTime">0:00</span></div>
    </div>

    <div class="controls">
      <button class="ctrl small" id="shuffleBtn" title="Shuffle" aria-label="Shuffle">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 3h5v5"/><path d="M4 20 21 3"/><path d="M21 16v5h-5"/><path d="m15 15 6 6"/><path d="M4 4l5 5"/></svg>
      </button>
      <button class="ctrl" id="prevBtn" title="Previous" aria-label="Previous">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 5a1 1 0 0 1 2 0v5.5l9.5-6A1 1 0 0 1 19 5.3v13.4a1 1 0 0 1-1.5.8L8 13.5V19a1 1 0 0 1-2 0V5z"/></svg>
      </button>
      <button class="play-btn" id="playBtn" title="Play" aria-label="Play/Pause">
        <svg viewBox="0 0 24 24" fill="currentColor"><path id="playIcon" d="M7 5.3c0-.9 1-1.4 1.7-.9l11 6.7c.7.4.7 1.4 0 1.8l-11 6.7c-.7.5-1.7 0-1.7-.9V5.3z"/></svg>
      </button>
      <button class="ctrl" id="nextBtn" title="Next" aria-label="Next">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18 5a1 1 0 0 0-2 0v5.5l-9.5-6A1 1 0 0 0 5 5.3v13.4a1 1 0 0 0 1.5.8L16 13.5V19a1 1 0 0 0 2 0V5z"/></svg>
      </button>
      <button class="ctrl small" id="repeatBtn" title="Repeat" aria-label="Repeat">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 2l4 4-4 4"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><path d="M7 22l-4-4 4-4"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
      </button>
    </div>

    <div class="volume">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M11 5 6 9H3v6h3l5 4V5z"/><path d="M15.5 8.5a5 5 0 0 1 0 7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      <div class="vbar" id="volBar"><div class="vfill" id="volFill"></div></div>
    </div>
  </div>

  <!-- Empty state -->
  <div class="empty" id="emptyUI">
    <h2>No songs yet 🎵</h2>
    <p class="hint">Open <code>index.html</code> and add your tracks to the <code>SONGS</code> list near the top of the script. Drop the audio files in a <code>songs/</code> folder in your repo.</p>
  </div>
</div>

<!-- Queue sheet -->
<div class="sheet-backdrop" id="sheetBackdrop"></div>
<div class="sheet" id="sheet">
  <div class="sheet-grip"></div>
  <div class="sheet-head"><h2>Up Next</h2><span id="queueCount"></span></div>
  <div class="queue" id="queueList"></div>
</div>

<audio id="audio" preload="metadata"></audio>

<script>
/* =====================================================================
   ┌──────────────────────────────────────────────────────────────┐
   │  ADD YOUR SONGS HERE                                           │
   │                                                                │
   │  - src : path to the audio file (mp3 / m4a)                    │
   │  - art : path to cover image (optional — remove the line or    │
   │          leave "" and a colored letter tile is used instead)   │
   │                                                                │
   │  Put audio files in a "songs/" folder and art in an "art/"     │
   │  folder in the same repo. Avoid spaces in file names.          │
   └──────────────────────────────────────────────────────────────┘
   ===================================================================== */
const SONGS = [
   {
     title: "Party Monster",
     artist: "The Weeknd",
     src:    "songs/The-Weeknd-Party-Monster.mp3",
     art:    "art/The-Weeknd-Starboy.png"
   },
   {
     title: "Psycho",
     artist: "Post Malone",
     src:    "songs/Post-Malone-Psycho.mp3",
  // art:    "art/The-Weeknd-Starboy.png"
  },
];
/* ===================================================================== */


/* ---- elements ---- */
const audio   = document.getElementById('audio');
const playerUI= document.getElementById('playerUI');
const emptyUI = document.getElementById('emptyUI');
const artImg  = document.getElementById('artImg');
const artFallback = document.getElementById('artFallback');
const trackTitle  = document.getElementById('trackTitle');
const trackArtist = document.getElementById('trackArtist');
const playBtn = document.getElementById('playBtn');
const playIcon= document.getElementById('playIcon');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const shuffleBtn = document.getElementById('shuffleBtn');
const repeatBtn  = document.getElementById('repeatBtn');
const seekBar = document.getElementById('seekBar');
const seekFill= document.getElementById('seekFill');
const seekKnob= document.getElementById('seekKnob');
const curTime = document.getElementById('curTime');
const durTime = document.getElementById('durTime');
const volBar  = document.getElementById('volBar');
const volFill = document.getElementById('volFill');
const ambient = document.getElementById('ambient');
const queueBtn= document.getElementById('queueBtn');
const sheet   = document.getElementById('sheet');
const sheetBackdrop = document.getElementById('sheetBackdrop');
const queueList = document.getElementById('queueList');
const queueCount= document.getElementById('queueCount');

/* ---- state ---- */
let order = SONGS.map((_, i) => i); // playback order (changes when shuffled)
let pos = 0;                        // index into `order`
let shuffle = false;
let repeat = 0;                     // 0 = off, 1 = repeat all, 2 = repeat one
const PLAY_PATH = "M7 5.3c0-.9 1-1.4 1.7-.9l11 6.7c.7.4.7 1.4 0 1.8l-11 6.7c-.7.5-1.7 0-1.7-.9V5.3z";
const PAUSE_PATH= "M8 5h3v14H8zM13 5h3v14h-3z";

const PALETTE = ['#e0566f','#6c8bf0','#3fbf8f','#e0a83f','#a86ce0','#3fb6bf','#e07b3f','#5fae5f'];
function colorFor(s){ let h=0; for(const c of s) h=(h*31+c.charCodeAt(0))>>>0; return PALETTE[h%PALETTE.length]; }

const cur = () => SONGS[order[pos]];

/* ---- boot ---- */
if (SONGS.length === 0){
  emptyUI.style.display = 'flex';
} else {
  playerUI.style.display = 'flex';
  load(pos, false);
  buildQueue();
}

function load(p, autoplay){
  pos = (p + order.length) % order.length;
  const song = cur();
  audio.src = song.src;
  trackTitle.textContent  = song.title  || 'Unknown title';
  trackArtist.textContent = song.artist || 'Unknown artist';

  // art
  const tint = colorFor(song.title || 'x');
  if (song.art){
    artImg.src = song.art;
    artImg.style.display = 'block';
    artFallback.style.display = 'none';
    artImg.onerror = () => { artImg.style.display='none'; showFallback(song, tint); };
  } else {
    showFallback(song, tint);
  }
  ambient.style.setProperty('--glow', tint + '55');

  highlightQueue();
  updateMediaSession();
  if (autoplay) play();
}

function showFallback(song, tint){
  artImg.style.display = 'none';
  artFallback.style.display = 'grid';
  artFallback.textContent = (song.title || '♪').trim().charAt(0).toUpperCase();
  artFallback.parentElement.style.background = `linear-gradient(145deg, ${tint}, ${tint}66)`;
}

/* ---- playback ---- */
function play(){ audio.play().catch(()=>{}); }
function pause(){ audio.pause(); }
function toggle(){ audio.paused ? play() : pause(); }

playBtn.addEventListener('click', toggle);
audio.addEventListener('play',  () => { playIcon.setAttribute('d', PAUSE_PATH); artImg.classList.add('spinning'); setMSState('playing'); });
audio.addEventListener('pause', () => { playIcon.setAttribute('d', PLAY_PATH); artImg.classList.remove('spinning'); setMSState('paused'); });

function next(auto){
  if (repeat === 2 && auto){ audio.currentTime = 0; play(); return; }
  if (pos === order.length - 1 && repeat === 0 && auto){ // reached end, stop
    pos = 0; load(pos, false); return;
  }
  load(pos + 1, true);
}
function prev(){
  if (audio.currentTime > 3){ audio.currentTime = 0; return; }
  load(pos - 1, true);
}
nextBtn.addEventListener('click', () => next(false));
prevBtn.addEventListener('click', prev);
audio.addEventListener('ended', () => next(true));

/* ---- shuffle & repeat ---- */
shuffleBtn.addEventListener('click', () => {
  shuffle = !shuffle;
  shuffleBtn.classList.toggle('on', shuffle);
  const currentSong = order[pos];
  if (shuffle){
    order = SONGS.map((_,i)=>i);
    for (let i=order.length-1;i>0;i--){ const j=(Math.random()*(i+1))|0; [order[i],order[j]]=[order[j],order[i]]; }
    // keep current song first so it doesn't jump
    const ci = order.indexOf(currentSong); [order[0],order[ci]]=[order[ci],order[0]]; pos = 0;
  } else {
    order = SONGS.map((_,i)=>i); pos = order.indexOf(currentSong);
  }
  buildQueue(); highlightQueue();
});

repeatBtn.addEventListener('click', () => {
  repeat = (repeat + 1) % 3;
  repeatBtn.classList.toggle('on', repeat !== 0);
  const old = repeatBtn.querySelector('.repeat-one-badge'); if (old) old.remove();
  if (repeat === 2){
    const b = document.createElement('span'); b.className='repeat-one-badge'; b.textContent='1';
    repeatBtn.appendChild(b);
  }
});

/* ---- seek bar ---- */
audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  const p = (audio.currentTime / audio.duration) * 100;
  seekFill.style.width = p + '%';
  seekKnob.style.left = p + '%';
  curTime.textContent = fmt(audio.currentTime);
  if (navigator.mediaSession && audio.duration){
    try { navigator.mediaSession.setPositionState({duration:audio.duration, position:audio.currentTime, playbackRate:1}); } catch(e){}
  }
});
audio.addEventListener('loadedmetadata', () => { durTime.textContent = fmt(audio.duration); });
seekBar.addEventListener('click', e => {
  const r = seekBar.getBoundingClientRect();
  audio.currentTime = ((e.clientX - r.left) / r.width) * (audio.duration || 0);
});
function fmt(s){ s=Math.floor(s||0); return Math.floor(s/60)+':'+String(s%60).padStart(2,'0'); }

/* ---- volume ---- */
audio.volume = 0.7;
volBar.addEventListener('click', e => {
  const r = volBar.getBoundingClientRect();
  const v = Math.min(1, Math.max(0, (e.clientX - r.left) / r.width));
  audio.volume = v; volFill.style.width = (v*100)+'%';
});

/* ---- queue sheet ---- */
function buildQueue(){
  queueList.innerHTML = '';
  queueCount.textContent = SONGS.length + (SONGS.length===1?' song':' songs');
  order.forEach((songIdx, qi) => {
    const s = SONGS[songIdx];
    const tint = colorFor(s.title || 'x');
    const item = document.createElement('div');
    item.className = 'q-item';
    item.dataset.qi = qi;
    item.innerHTML = `
      <div class="q-art" style="background:linear-gradient(145deg, ${tint}, ${tint}66);">
        ${s.art ? `<img src="${s.art}" onerror="this.remove()" alt="">` : (s.title||'♪').charAt(0).toUpperCase()}
      </div>
      <div class="q-text">
        <div class="q-title">${escapeHtml(s.title||'Unknown title')}</div>
        <div class="q-artist">${escapeHtml(s.artist||'Unknown artist')}</div>
      </div>
      <div class="q-eq" style="display:none;"><span></span><span></span><span></span></div>`;
    item.addEventListener('click', () => { load(qi, true); closeSheet(); });
    queueList.appendChild(item);
  });
}
function highlightQueue(){
  [...queueList.children].forEach((el,i) => {
    const on = (i === pos);
    el.classList.toggle('current', on);
    el.querySelector('.q-eq').style.display = on ? 'flex' : 'none';
  });
}
function escapeHtml(s){ return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

queueBtn.addEventListener('click', openSheet);
sheetBackdrop.addEventListener('click', closeSheet);
function openSheet(){ if(SONGS.length){ sheet.classList.add('open'); sheetBackdrop.classList.add('open'); } }
function closeSheet(){ sheet.classList.remove('open'); sheetBackdrop.classList.remove('open'); }

/* ---- Media Session API (lock-screen / notification controls) ---- */
function updateMediaSession(){
  if (!('mediaSession' in navigator)) return;
  const s = cur();
  const artwork = s.art ? [{src:s.art, sizes:'512x512', type:'image/jpeg'}] : [];
  navigator.mediaSession.metadata = new MediaMetadata({
    title: s.title || 'Unknown title',
    artist: s.artist || 'Unknown artist',
    album: 'My Music',
    artwork
  });
  navigator.mediaSession.setActionHandler('play',  play);
  navigator.mediaSession.setActionHandler('pause', pause);
  navigator.mediaSession.setActionHandler('previoustrack', prev);
  navigator.mediaSession.setActionHandler('nexttrack', () => next(false));
  navigator.mediaSession.setActionHandler('seekto', d => { if(d.seekTime!=null) audio.currentTime = d.seekTime; });
}
function setMSState(state){ if('mediaSession' in navigator) navigator.mediaSession.playbackState = state; }

/* ---- keyboard niceties (desktop) ---- */
document.addEventListener('keydown', e => {
  if (!SONGS.length) return;
  if (e.code === 'Space'){ e.preventDefault(); toggle(); }
  if (e.code === 'ArrowRight') next(false);
  if (e.code === 'ArrowLeft')  prev();
});
volFill.style.width = (audio.volume*100)+'%';
</script>
